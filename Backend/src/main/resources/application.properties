# Server
server.port=${PORT:8082}

# Database (PostgreSQL - Use Environment Variables)
# For Railway deployment, set these environment variables:
# DATABASE_URL=jdbc:postgresql://db.kwsbmyxagmndeiwgfdbo.supabase.co:5432/postgres
# DATABASE_USERNAME=postgres
# DATABASE_PASSWORD=your_supabase_password
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:c2VjcmV0S2V5Rm9yVGFza01hbmFnZXJBcHBsaWNhdGlvbjIwMjQ=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000}

# Logging
logging.level.com.taskmanager=INFO
logging.level.org.springframework.security=WARN
