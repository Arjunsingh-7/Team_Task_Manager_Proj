# Server
server.port=${PORT:8082}

# Database is configured in DatabaseConfig.java
# Railway's DATABASE_URL will be parsed automatically

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:c2VjcmV0S2V5Rm9yVGFza01hbmFnZXJBcHBsaWNhdGlvbjIwMjQ=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000}

# Logging
logging.level.com.taskmanager=INFO
logging.level.org.springframework.security=WARN
